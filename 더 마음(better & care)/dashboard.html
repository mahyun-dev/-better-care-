<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'self';" />
  <title>더 나음 관리자 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin-dashboard.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar" aria-label="관리자 메뉴">
      <div class="brand">
        <p class="brand__title">더 나음 Admin</p>
        <p class="brand__sub">better & care management</p>
      </div>
      <nav class="menu">
        <button class="menu__item is-active" data-tab="products" type="button">상품 관리</button>
        <button class="menu__item" data-tab="categories" type="button">카테고리 관리</button>
        <button class="menu__item" data-tab="banners" type="button">배너 관리</button>
        <button class="menu__item" data-tab="icons" type="button">아이콘 관리</button>
        <button class="menu__item" data-tab="members" type="button">회원 관리</button>
      </nav>
      <a class="go-site" href="index.html">쇼핑몰로 돌아가기</a>
    </aside>

    <main class="main" role="main">
      <header class="topbar">
        <div>
          <h1 class="topbar__title">운영 대시보드</h1>
          <p class="topbar__desc">상품, 배너, 아이콘, 회원 운영을 한 화면에서 관리하세요.</p>
        </div>
        <div class="topbar__actions">
          <input id="globalSearch" class="input" type="search" placeholder="이름, 이메일, 상품 검색" maxlength="60" />
          <button id="saveAllBtn" class="btn btn--primary" type="button">전체 저장</button>
        </div>
      </header>

      <section class="kpi-grid" aria-label="요약 지표">
        <article class="kpi-card"><p class="kpi-card__label">총 상품 수</p><p id="kpiProducts" class="kpi-card__value">0</p></article>
        <article class="kpi-card"><p class="kpi-card__label">노출 카테고리</p><p id="kpiCategories" class="kpi-card__value">0</p></article>
        <article class="kpi-card"><p class="kpi-card__label">활성 배너</p><p id="kpiBanners" class="kpi-card__value">0</p></article>
        <article class="kpi-card"><p class="kpi-card__label">아이콘 세트</p><p id="kpiIcons" class="kpi-card__value">0</p></article>
        <article class="kpi-card"><p class="kpi-card__label">전체 회원</p><p id="kpiMembers" class="kpi-card__value">0</p></article>
      </section>

      <section id="tab-products" class="panel is-active" aria-label="상품 관리 패널">
        <div class="panel__head">
          <h2>상품 관리</h2>
          <div class="inline-actions">
            <select id="productStatusFilter" class="input input--sm">
              <option value="all">전체 상태</option>
              <option value="판매중">판매중</option>
              <option value="품절">품절</option>
              <option value="숨김">숨김</option>
            </select>
            <button id="addProductBtn" class="btn" type="button">상품 추가</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="table" id="productsTable">
            <thead><tr><th>상품명</th><th>이미지</th><th>카테고리</th><th>가격</th><th>상태</th><th>관리</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="tab-categories" class="panel" aria-label="카테고리 관리 패널">
        <div class="panel__head">
          <h2>카테고리 관리</h2>
          <button id="addCategoryBtn" class="btn" type="button">카테고리 추가</button>
        </div>
        <div class="table-wrap">
          <table class="table" id="categoriesTable">
            <thead><tr><th>아이콘</th><th>카테고리명</th><th>노출 상태</th><th>상품 수</th><th>관리</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="tab-banners" class="panel" aria-label="배너 관리 패널">
        <div class="panel__head">
          <h2>배너 관리</h2>
          <button id="addBannerBtn" class="btn" type="button">배너 추가</button>
        </div>
        <div class="table-wrap">
          <table class="table" id="bannersTable">
            <thead><tr><th>배너명</th><th>이미지</th><th>노출 위치</th><th>기간</th><th>상태</th><th>관리</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="tab-icons" class="panel" aria-label="아이콘 관리 패널">
        <div class="panel__head">
          <h2>아이콘 관리</h2>
          <button id="addIconBtn" class="btn" type="button">아이콘 추가</button>
        </div>
        <div class="table-wrap">
          <table class="table" id="iconsTable">
            <thead><tr><th>아이콘</th><th>표시 방식</th><th>이름</th><th>연결 메뉴</th><th>노출</th><th>관리</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="tab-members" class="panel" aria-label="회원 관리 패널">
        <div class="panel__head">
          <h2>회원 관리</h2>
          <div class="inline-actions">
            <select id="memberRoleFilter" class="input input--sm">
              <option value="all">전체 권한</option>
              <option value="일반">일반</option>
              <option value="보호자">보호자</option>
              <option value="관리자">관리자</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table class="table" id="membersTable">
            <thead><tr><th>이름</th><th>이메일</th><th>권한</th><th>가입일</th><th>상태</th><th>관리</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <dialog id="adminModal" class="modal">
    <form method="dialog" id="adminForm" class="modal__form">
      <h3 id="modalTitle">항목 추가</h3>
      <div id="modalFields" class="modal__fields"></div>
      <div class="modal__actions">
        <button value="cancel" class="btn" type="submit">취소</button>
        <button id="modalSubmit" value="default" class="btn btn--primary" type="submit">저장</button>
      </div>
    </form>
  </dialog>

  <div id="adminToast" class="toast" role="status" aria-live="polite"></div>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
